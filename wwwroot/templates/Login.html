<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <link rel="stylesheet" href="/CSS/Login.css" />
</head>
<body>
    <div class="LoginDiv">
        <h1>Login</h1>
        <form class="loginForm" id="loginForm">
            <input class="Inputlogin" id="InputUsername" type="text" placeholder="Enter your Username: " required />
            <input class="Inputlogin" id="InputPassword" type="password" placeholder="Enter your Password: " required />
            <div class="ButtonDiv">
                <button class="Button" id="LoginButton" type="button"> Login</button>
                <button class="Button" id="SignUpButton" type="button"> SignUp</button>
            </div>
        </form>
        
        <a href="" id="ButtonForget">Forgot Password?</a>
      
        <script src="/TS/Login.js"></script>
    </div>

</body>
</html>
