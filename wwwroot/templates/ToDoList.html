<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <link rel="stylesheet" href="/CSS/ToDoList.css" />
</head>
<body>
    <div class="ToDoListDiv">
        <h1>My To-Do List</h1>

        <div class="InputDiv">
            <input class="InputTask" id="InputTask" type="text" placeholder="write your tasks here..." required/>
            <button class="Button" id="AddButton">Add Task</button>
        </div>

        <div class="TasksDiv">

            <div class="TaskStatus">
                <a class="status active" data-tab="todo">To-Do</a>
                <span class="tab-separator">|</span>
                <a class="status" data-tab="completed">Completed</a>
                <span class="tab-separator">|</span>
                <a class="status" data-tab="deleted">Recently Deleted</a>
            </div>

            <div id="taskList">
                <ul id="taskUl">
                    
                </ul>
            </div>

        </div>

        <button class="Button" id="LogoutButton">Logout</button>


        <script src="/TS/ToDoList.js"></script>
    </div>

</body>
</html>
